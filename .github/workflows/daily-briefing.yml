name: TE Daily Media Intelligence

on:
  schedule:
    - cron: '0 6 * * 1-5'  # Mo-Fr 06:00 UTC = 07:00 CET — werktags only (Wochenend-Berichterstattung wird Montag aufgeholt)
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

jobs:
  daily-briefing:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Daily Media Intelligence Agent
        run: python -m src.main

      - name: Commit and push report
        run: |
          git config user.name "TE Media Intelligence Agent"
          git config user.email "sdj@te-communications.com"
          # Copy latest HTML report to docs/ for GitHub Pages
          LATEST=$(ls -t output/*_TE_Media_Intelligence.html 2>/dev/null | head -1)
          if [ -n "$LATEST" ]; then
            cp "$LATEST" docs/latest.html
          fi
          git add output/ docs/ || true
          git diff --staged --quiet || git commit -m "📊 Daily Briefing $(TZ='Europe/Berlin' date '+%Y-%m-%d %H:%M CET')"
          git push

      - name: Send report via email
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
        run: python -m src.send_email
        continue-on-error: true

      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-briefing-${{ github.run_id }}
          path: |
            output/*.html
            output/*.txt
          retention-days: 90
