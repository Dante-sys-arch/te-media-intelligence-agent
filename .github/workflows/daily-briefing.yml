# TE Communications Daily Media Intelligence Agent
# Placeholder workflow — currently the briefing is generated via Claude.ai
# Future: automate via Anthropic API with web search

name: Daily Media Intelligence Briefing

on:
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC = 07:00 CET
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate briefing placeholder
        run: |
          echo "Daily Media Intelligence Briefing"
          echo "Date: $(TZ='Europe/Berlin' date '+%A, %d. %B %Y — %H:%M CET')"
          echo ""
          echo "NOTE: The full briefing is currently generated via Claude.ai"
          echo "This workflow serves as a placeholder for future API-based automation."
          echo ""
          echo "To generate today's briefing:"
          echo "1. Open Claude.ai"
          echo "2. Use the Daily Media Intelligence prompt with today's date"
          echo "3. Claude will perform live web research across all 12 topic areas"
          echo "4. The output is rendered as an interactive React dashboard"
