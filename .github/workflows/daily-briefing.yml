name: TE Daily Media Intelligence

on:
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC = 07:00 CET
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

jobs:
  daily-briefing:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Daily Media Intelligence Agent
        run: python -m src.main

      - name: Commit and push report
        run: |
          git config user.name "TE Media Intelligence Agent"
          git config user.email "sdj@te-communications.com"
          git add output/ || true
          git diff --staged --quiet || git commit -m "📊 Daily Briefing $(TZ='Europe/Berlin' date '+%Y-%m-%d %H:%M CET')"
          git push

      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-briefing-${{ github.run_id }}
          path: |
            output/*.html
            output/*.txt
          retention-days: 90
